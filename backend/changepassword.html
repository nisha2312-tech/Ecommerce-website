<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>
    <link rel="stylesheet" href="admin.css"/>
</head>
<body>
    <!-- Image section -->
    <div class="maincontainer">
        <div class="innercontainer">
            <img src="images/admin.jpg" alt="image not found"/>
        </div>
    </div>

    <!-- Date section -->
    <div class="maincontainer1">
        <div class="innercontainer1">
            <p>Wednesday, 12th Feb 2025</p>
        </div>
    </div>

    <!-- Form section -->
    <div class="maincontainer2">
        <div class="innercontainer2">
            <form id="changePasswordForm" method="post">
                <table class="login-table">
                    <tr>
                        <td></td>
                        <td class="login-title">Change Password</td>
                    </tr>
                    <tr>
                        <td>Username</td>
                        <td><input type="text" name="uname" id="username" required /></td>
                    </tr>
                    <tr>
                        <td>Current Password</td>
                        <td><input type="password" name="oldpass" id="currentpassword" required /></td>
                    </tr>
                    <tr>
                        <td>New Password</td>
                        <td><input type="password" name="newpass" id="newpassword" required /></td>
                    </tr>
                    <tr>
                        <td>Confirm Password</td>
                        <td><input type="password" id="confirmpassword" required /></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td><input type="submit" value="Change Password" class="login-btn" /></td>
                    </tr>
                </table>
            </form>
        </div>
    </div>

    <!-- Empty spacer -->
    <div class="maincontainer1">
        <div class="innercontainer1"></div>
    </div>

    <!-- Message -->
    <p id="message"></p>

    <!-- JavaScript -->
    <script>
        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const currentPassword = document.getElementById('currentpassword').value;
            const newPassword = document.getElementById('newpassword').value;
            const confirmPassword = document.getElementById('confirmpassword').value;

            // Check if new password matches confirm password
            if (newPassword !== confirmPassword) {
                document.getElementById('message').textContent = 'New password and confirm password do not match.';
                return;
            }

            try {
                const res = await fetch('/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, currentPassword, newPassword })
                });

                const data = await res.json();
                document.getElementById('message').textContent = data.message;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('message').textContent = 'An error occurred while changing the password.';
            }
        });
    </script>
</body>
</html>
